name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: nickolaspapadopoulos/android-sdk-action@v2
        with:
          api-level: 34
          build-tools: 34.0.0
          components: 'platforms;android-34,build-tools;34.0.0'

      - name: Build debug APK
        run: |
          cd hermes-android-bridge
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hermes-android-bridge
          path: hermes-android-bridge/app/build/outputs/apk/debug/app-debug.apk
