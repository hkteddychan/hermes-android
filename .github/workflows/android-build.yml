name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.4
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug --no-daemon -p hermes-android-bridge
      - uses: actions/upload-artifact@v4
        with:
          name: hermes-android-bridge
          path: hermes-android-bridge/app/build/outputs/apk/debug/app-debug.apk
