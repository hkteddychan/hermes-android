name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build debug APK
        env:
          ANDROID_HOME: /opt/android-sdk
          ANDROID_SDK_ROOT: /opt/android-sdk
        run: |
          cd hermes-android-bridge
          # Fix gradlew permissions
          chmod +x gradlew
          # Download gradle if needed
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading gradle-wrapper.jar..."
            curl -sL -o gradle/wrapper/gradle-wrapper.jar \
              https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar
          fi
          # Show environment
          echo "Java version:"
          java -version
          echo "Gradlew content:"
          head -5 gradlew
          echo "Wrapper jar size:"
          ls -la gradle/wrapper/
          # Build with verbose output
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -100

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hermes-android-bridge
          path: hermes-android-bridge/app/build/outputs/apk/debug/app-debug.apk
